# CloudSage - Path A (self-hosted / sovereign) local stack
# Start:  docker compose -f deploy/docker-compose.yml up -d
# Stop:   docker compose -f deploy/docker-compose.yml down
#
# Data stays on this machine (GDPR-safe by construction). The named volume
# `qdrant_data` persists vectors across restarts and lives outside the repo.

services:
  qdrant:
    image: qdrant/qdrant:v1.18.2 # pinned: verified healthy + store/search smoke test 2026-07-04
    container_name: cloudsage-qdrant
    ports:
      - "6333:6333" # REST API + web dashboard (http://localhost:6333/dashboard)
      - "6334:6334" # gRPC (faster bulk upserts, used later)
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
